<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
             user-scalable=no, viewport-fit=cover"
  >
  <meta name="theme-color"                             content="#1B5E20">
  <meta name="apple-mobile-web-app-capable"            content="yes">
  <meta name="apple-mobile-web-app-status-bar-style"   content="black-translucent">
  <title>Skip-Bo Mobile v6.6.0</title>

  <style>
    /* ============================================================ */
    /* BASIS-RESET & BOX-SIZING                                     */
    /* ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin:      0;
      padding:     0;
      height:      100%;
      width:       100%;
      background:  #1B5E20;
      color:       white;
      font-family: Arial, sans-serif;
      overflow:    hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* ============================================================ */
    /* INFOLABEL – vollbreitig, fixiert, verschiebbar               */
    /* ============================================================ */
    /* ── STATUS-LABEL v6.5.8: verschiebbarer Infobalken ── */
    #status-label {
      position:        fixed;
      top:             0;
      left:            0;
      width:           100%;
      max-width:       100%;
      background:      rgba(46, 125, 50, 0.94);
      padding:         8px 50px 8px 10px; /* rechts Platz für separierten ⚙️-Button */
      text-align:      center;
      font-size:       0.95rem;
      font-weight:     500;
      z-index:         1000;
      cursor:          grab;
      user-select:     none;
      box-shadow:      0 3px 8px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      border-bottom:   1px solid rgba(255, 255, 255, 0.2);
      border-radius:   0 0 8px 8px;
      white-space:     nowrap;
      overflow:        hidden;
      text-overflow:   ellipsis;
      transform:       none;
    }

    #status-label:active {
      cursor: grabbing;
    }

    /* ── SCHNELLMENÜ-BUTTONS ── */
    .qm-btn {
      display:      block;
      width:        100%;
      padding:      12px 16px;
      background:   transparent;
      border:       none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color:        white;
      font-size:    0.95rem;
      text-align:   left;
      cursor:       pointer;
      touch-action: manipulation;
      transition:   background 0.15s;
    }
    .qm-btn:active {
      background: rgba(255,255,255,0.12);
    }
    .qm-btn:last-child {
      border-bottom: none;
    }

    /* ============================================================ */
    /* GAME CONTAINER – 9:16-Proportion, responsive                 */
    /* ============================================================ */
    .game-container {
      aspect-ratio:    9 / 16;
      height:          100dvh;
      width:           min(100vw, calc(100dvh * 9 / 16));
      margin:          0 auto;
      background:      transparent;
      display:         flex;
      flex-direction:  column;
      overflow:        hidden;
      padding-top:     42px; /* Platz für fixierten Infobalken */
      position:        relative;
    }

    /* ============================================================ */
    /* BEREICHE – exakte Flex-Verteilung für 5 gleiche Kartenreihen */
    /* ============================================================ */
    .opponent-area {
      flex:           2;
      display:        flex;
      flex-direction: column;
      gap:            4px;
      padding:        4px 4px 2px;
      min-height:     0;
    }

    .build-area {
      flex:             1;
      display:          flex;
      flex-direction:   column;
      justify-content:  center;
      padding:          4px;
      min-height:       0;
    }

    .human-area {
      flex:           2;
      display:        flex;
      flex-direction: column;
      gap:            4px;
      padding:        2px 4px 4px;
      min-height:     0;
    }

    /* ============================================================ */
    /* REIHEN & HÄNDE – je 1/5 der verfügbaren Höhe                 */
    /* ============================================================ */
    .main-piles,
    .hand {
      flex:                    1;
      min-height:              0;
      display:                 grid;
      grid-template-columns:   repeat(5, 1fr);
      gap:                     4px;
      align-items:             center;
      justify-items:           center;
      width:                   100%;
    }

    /* ============================================================ */
    /* KARTEN & FELDER                                              */
    /* ============================================================ */
    .field {
      background:      rgba(255, 255, 255, 0.1);
      border:          2px dashed #fff;
      border-radius:   8px;
      display:         flex;
      justify-content: center;
      align-items:     center;
      position:        relative;
      overflow:        hidden;
      perspective:     1000px;
      width:           100%;
      height:          100%;
    }

    .card {
      border:          2px solid #000 !important;
      border-radius:   8px;
      aspect-ratio:    2 / 3;
      width:           100% !important;
      height:          auto !important;
      max-height:      100%;
      margin:          auto;
      display:         flex;
      flex-direction:  column;
      justify-content: space-between;
      padding:         5px;
      position:        relative;
      transform-style: preserve-3d;
      transition:      transform 0.5s, box-shadow 0.5s;
      box-shadow:      0 0 5px #000000, 0 0 15px #000000 inset;
      background:      radial-gradient(circle, rgba(255,255,255,0.1), rgba(255,255,255,0.8));
    }

    .card.selected {
      transform: translateY(-40px) rotateY(15deg) rotateX(10deg);
      animation:
        neon-pulse  1.5s infinite alternate,
        card-float  2s   infinite;
    }

    .card.backface {
      background: lightgreen !important;
      animation:  card-glow 2s ease-in-out infinite alternate;
    }

    .card.backface::before {
      content:         "SKIP-BO";
      position:        absolute;
      top:             50%;
      left:            50%;
      transform:       translate(-50%, -50%) rotate(-45deg);
      font-size:       1.5rem;
      font-weight:     bold;
      color:           rgba(255, 255, 255, 0.8);
      text-shadow:     2px 2px 4px rgba(0, 0, 0, 0.5);
      letter-spacing:  2px;
    }

    .card-corner {
      position:    absolute;
      font-size:   1.2rem;
      font-weight: bold;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }
    .card-corner.top-left     { top: 5px;    left:  5px; }
    .card-corner.top-right    { top: 5px;    right: 5px; }
    .card-corner.bottom-left  { bottom: 5px; left:  5px; transform: rotate(180deg); }
    .card-corner.bottom-right { bottom: 5px; right: 5px; transform: rotate(180deg); }

    .card-middle {
      position:    absolute;
      top:         50%;
      left:        50%;
      transform:   translate(-50%, -50%);
      font-size:   2rem;
      font-weight: bold;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
    }

    .human-area    .field.stock .card,
    .opponent-area .field.stock .card,
    .build-area    .field.draw-pile .card {
      width:      100%;
      height:     auto;
      max-height: 100%;
    }

    /* ============================================================ */
    /* KARTENFARBEN                                                  */
    /* ============================================================ */
    .card:not(.backface)[data-value="1"],
    .card:not(.backface)[data-value="2"],
    .card:not(.backface)[data-value="3"],
    .card:not(.backface)[data-value="4"] {
      background: radial-gradient(
        circle,
        #BBDEFB, #64B5F6, #2196F3, #0D47A1
      ) !important;
      box-shadow: 0 0 15px #2196F3;
    }

    .card:not(.backface)[data-value="5"],
    .card:not(.backface)[data-value="6"],
    .card:not(.backface)[data-value="7"],
    .card:not(.backface)[data-value="8"] {
      background: radial-gradient(
        circle,
        #C8E6C9, #81C784, #4CAF50, #1B5E20
      ) !important;
      box-shadow: 0 0 15px #4CAF50;
    }

    .card:not(.backface)[data-value="9"],
    .card:not(.backface)[data-value="10"],
    .card:not(.backface)[data-value="11"],
    .card:not(.backface)[data-value="12"] {
      background: radial-gradient(
        circle,
        #FFCDD2, #EF9A9A, #f44336, #B71C1C
      ) !important;
      box-shadow: 0 0 15px #f44336;
    }

    .card:not(.backface)[data-type="joker"] {
      background: radial-gradient(
        circle,
        #FFF9C4, yellow, gold, #FFD700
      ) !important;
      color:      #000;
      box-shadow: 0 0 15px gold;
    }

    /* ============================================================ */
    /* ANIMATIONEN                                                   */
    /* ============================================================ */
    @keyframes card-glow {
      from { box-shadow: 0 0  5px #1565C0; }
      to   { box-shadow: 0 0 15px #0D47A1; }
    }

    @keyframes neon-pulse {
      from {
        box-shadow:
          0 0 10px #FFD700, 0 0 20px #FFD700,
          0 0 30px #FFD700, 0 0 40px #FFD700;
      }
      to {
        box-shadow:
          0 0 20px #FFD700, 0 0 30px #FFD700,
          0 0 40px #FFD700, 0 0 50px #FFD700;
      }
    }

    @keyframes card-float {
      0%   { transform: translateY(   0); }
      50%  { transform: translateY(-20px); }
      100% { transform: translateY(   0); }
    }

    @keyframes card-drop {
      0%   { transform: translateY(-40px) rotateY(15deg) rotateX(10deg); }
      100% { transform: translateY(   0)  rotateY( 0deg) rotateX( 0deg); }
    }

    /* ============================================================ */
    /* LABEL-STILE & INFO-FENSTER                                    */
    /* ============================================================ */
    .field::after {
      content:       attr(data-label);
      position:      absolute;
      bottom:        4px;
      left:          2px;
      right:         2px;
      font-size:     0.65rem;
      color:         rgba(255, 255, 255, 0.9);
      text-align:    center;
      padding:       2px;
      background:    rgba(0, 0, 0, 0.4);
      border-radius: 3px;
    }

    .field.card.selected {
      box-shadow: 0 0 15px #FFD700, 0 0 30px #FFD700 inset;
      transform:  translateY(-40px) rotateY(15deg) rotateX(10deg) scale(1.05);
      animation:
        neon-pulse 1.5s infinite alternate,
        card-float 2s   infinite;
      transition: all 0.3s ease;
    }

    .field.card.placed {
      animation: card-drop 1s forwards;
    }

    .field.card {
      transition:   all 0.3s ease;
      touch-action: manipulation;
    }

    .joker-number {
      position:         absolute;
      top:              5px;
      left:             50%;
      transform:        translateX(-50%);
      font-size:        0.8em;
      color:            black;
      background-color: rgba(255, 255, 255, 0.8);
      padding:          1px 3px;
      border-radius:    2px;
    }

    #info-window {
      position:      absolute;
      top:           -300px;
      left:          50%;
      transform:     translateX(-50%);
      background:    #000;
      color:         white;
      padding:       15px;
      text-align:    center;
      font-size:     1.2rem;
      z-index:       1001;
      box-shadow:    0 4px 8px rgba(0, 0, 0, 0.2);
      width:         80%;
      max-width:     600px;
      display:       none;
    }

    #info-table {
      width:           100%;
      border-collapse: collapse;
      margin:          0 auto;
    }

    #info-table td {
      border:     1px solid #ddd;
      padding:    8px;
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
    }

    .stock-count {
      position:         absolute;
      top:              5px;
      left:             50%;
      transform:        translateX(-50%);
      font-size:        0.8em;
      color:            black;
      background-color: rgba(255, 255, 255, 0.8);
      padding:          1px 3px;
      border-radius:    2px;
      z-index:          1;
    }

    /* ============================================================ */
    /* KI-OVERLAYS & STRATEGIE-TAGS                                  */
    /* ============================================================ */
    .ai-prediction-overlay {
      position:       absolute;
      top:            -2px;
      left:           -2px;
      right:          -2px;
      bottom:         -2px;
      border:         2px solid #ff4444;
      border-radius:  8px;
      animation:      prediction-pulse 1.8s ease-in-out infinite;
      pointer-events: none;
      z-index:        999;
      box-shadow:     0 0 12px rgba(255, 68, 68, 0.3);
    }

    @keyframes prediction-pulse {
      0%   { opacity: 0.4; transform: scale(0.98); }
      50%  { opacity: 0.9; transform: scale(1.02); }
      100% { opacity: 0.4; transform: scale(0.98); }
    }

    .strategy-tag {
      position:        absolute;
      bottom:          calc(100% + 5px);
      left:            50%;
      transform:       translateX(-50%);
      background:      rgba(40, 40, 40, 0.9);
      color:           #fff;
      padding:         4px 12px;
      border-radius:   15px;
      font-size:       0.85em;
      font-weight:     bold;
      white-space:     nowrap;
      backdrop-filter: blur(2px);
      z-index:         1001;
      box-shadow:      0 3px 6px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<body>
  <!-- STATUS-BALKEN mit verschiebbarem Label -->
  <div id="status-label">
    <span id="status-text">🎮 Spielstart: Karten werden gemischt...</span>

  <!-- ⚙️-MENÜ-BUTTON: separat vom Label damit Drag-Handler ihn nicht blockiert -->
  <button id="menu-btn" title="Menü öffnen"
    style="
      position:      fixed;

    "

<script>
// ================================================================

// ================================================================
// Kleine, überall genutzte Helfer. Hier (und nur hier) liegt die
// EINE Wahrheit über Kartenwerte und Baustapel-Zustände.

// statt eigene Wert-Berechnungen zu erfinden.
// ================================================================

/**
 * pauseForSeconds(multiplier) – Pausenfunktion für async KI-Züge.
 * Wartezeit = spielGeschwindigkeit × multiplier Sekunden.
 * Skaliert mit dem Geschwindigkeits-Slider (0 = keine Pausen).
 * @param {number} multiplier – Faktor (Standard: 1)
 * @returns {Promise}
 */
function pauseForSeconds(multiplier = 1) {
  return new Promise(resolve => {
    setTimeout(resolve, spielGeschwindigkeit * multiplier * 1000);
  });
}

/**
 * delayWithCallback(ms, callback) – Hilfsfunktion für verzögerte Callbacks.
 * (Aus v6.5.9 übernommen – wird für UI-Effekte genutzt.)
 */
function delayWithCallback(ms, callback) {
  setTimeout(callback, ms);
}

/**
 * cardNumericValue(card) – Numerischer Wert einer Karte.
 * Zahlenkarte → 1..12. Joker → 0 (Joker haben keinen festen Wert).
 * @param {Object} card – Kartenobjekt {type, value}
 * @returns {number}
 */
function cardNumericValue(card) {
  if (!card) return 0;
  return card.type === 'joker' ? 0 : parseInt(card.value, 10);
}

/**
 * pileTopValue(pile) – Effektiver Wert der obersten Baustapelkarte.
 * Leer → 0. Joker oben → Position im Stapel (= vertretener Wert).
 * Zahlenkarte → ihr Wert.
 * Zentrale Funktion: ersetzt verstreute Einzelberechnungen.
 * @param {Array} pile – Ein Baustapel-Array
 * @returns {number} 0..12
 */
function pileTopValue(pile) {
  if (!pile || pile.length === 0) return 0;
  const topCard = pile[pile.length - 1];
  return topCard.type === 'joker' ? pile.length : parseInt(topCard.value, 10);
}

/**
 * nextNeededOnPile(pile) – Welcher Wert wird als Nächstes auf dem
 * Baustapel benötigt? (TopWert + 1, bei leerem Stapel die 1.)
 * @param {Array} pile – Ein Baustapel-Array
 * @returns {number} 1..13 (13 = Stapel ist mit 12 voll, wird gleich geleert)
 */
function nextNeededOnPile(pile) {
  return pileTopValue(pile) + 1;
}

/**
 * getJokerValue(buildPile, jokerPosition) – Ermittelt welchen Wert ein Joker vertritt.
 * Position 0 → Wert 1. Sonst: Vorgängerkarte + 1.
 * @param {Array} buildPile – Der Baustapel-Array
 * @param {number} jokerPosition – Position des Jokers im Stapel
 * @returns {number} Effektiver Wert des Jokers
 */
function getJokerValue(buildPile, jokerPosition) {
  if (jokerPosition === 0) return 1;
  const previousCard = buildPile[jokerPosition - 1];
  return previousCard.type === 'joker'
    ? jokerPosition + 1
    : parseInt(previousCard.value) + 1;
}

  const menuBtn = document.getElementById('menu-btn');
  if (menuBtn) {
    // Touch UND Click beide binden für maximale Mobile-Kompatibilität
    menuBtn.addEventListener('touchstart', e => {
      e.preventDefault();
      e.stopPropagation();
      toggleQuickMenu(e);
    }, { passive: false });
    menuBtn.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      toggleQuickMenu(e);
    });
  }

  // Alte Strategie-Overlays entfernen
  // FIX 10.6.2026: el.remove() hätte hier markierte Baustapel-Felder
  // mitgelöscht – clearAiPredictionMarkers() nimmt nur Klasse/Tags.
  clearAiPredictionMarkers();

  // Falls KI als erstes dran ist (derzeit immer 'human' zuerst)
  if (currentPlayer === 'ai') setTimeout(() => aiTurn(0), 3000);
}

function resetGameState() {

/**
 * loadSavedSpeed() – Gespeicherte Spielgeschwindigkeit aus localStorage laden.
 */
function loadSavedSpeed() {
  try {
    const savedSpeed = localStorage.getItem('skipbo-speed');
    if (savedSpeed) spielGeschwindigkeit = parseInt(savedSpeed);
  } catch (e) {

  }
}

/**
 * buildDeck() – Deck aufbauen: 12 Sätze × 12 Zahlenkarten + 12 Joker.
 * Gesamtkarten: 144 + 12 = 156 Karten.
 */
function buildDeck() {
  Game.deck = [];
  // 12 Sätze mit je den Werten 1-12
  for (let s = 0; s < 12; s++) {
    for (let n = 1; n <= 12; n++) {
      Game.deck.push({ type: 'number', value: n });
    }
  }
  // 12 Joker-Karten
  for (let j = 0; j < 12; j++) {
    Game.deck.push({ type: 'joker', value: '★' });
  }
}

/**
 * shuffleDeck(arr) – Fisher-Yates Algorithmus für zuverlässiges Mischen.
 * Mischt das übergebene Array in-place.
 * @param {Array} arr – Das zu mischende Array
 */
function shuffleDeck(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/**
 * dealCards() – Karten an Spieler verteilen.
 * Spieler: 5 Handkarten + 20 Stockkarten.
 * KI: 5 Handkarten + 20 Stockkarten.
 * Rest: Nachziehstapel.
 */
function dealCards() {
  Game.players.human.hand  = Game.deck.splice(0,  5);
  Game.players.ai.hand     = Game.deck.splice(0,  5);
  Game.players.human.stock = Game.deck.splice(0, 20);
  Game.players.ai.stock    = Game.deck.splice(0, 20);
  Game.drawPile            = Game.deck; // Rest = Nachziehstapel

  // Sichtbarkeit: Spieler sieht seine Karten, KI-Karten sind verdeckt
  Game.players.human.hand.forEach(card => card.faceUp = true);
  Game.players.ai.hand.forEach(card   => card.faceUp = false);
}

/**
 * initTracking() – KI-Tracking-Struktur initialisieren.
 * Verfolgt Deck-Zusammensetzung und Ablage-Historie für KI-Vorhersagen.
 * REPARIERT v6.6.0: deckComposition ist jetzt ein sauberes Objekt
 * { 1:12, 2:12, ..., 12:12, joker:12 } statt eines fehlerhaften
 * Misch-Arrays (in v6.5.9 liefen Wert-12- und Joker-Zugriffe ins Leere).
 */
function initTracking() {
  const composition = { joker: 12 };
  for (let v = 1; v <= 12; v++) composition[v] = 12;

  Game.tracking = {
    // Verbleibende Karten je Wert (Wahrscheinlichkeitsrechnung)
    deckComposition: composition,
    // Ablage-Historie beider Spieler (für detectConsecutiveDiscards)
    discardHistory: {
      human: { values: [], timestamps: [] },
      ai:    { values: [], timestamps: [] }
    },
    // Stock-Vorhersagen (für predictEnemyStock)
    stockPredictions: {
      human: { nextExpected: 1, confidence: 0 },
      ai:    { nextExpected: 1, confidence: 0 }
    }
  };
}

// MODUL 06 – SPIELREGELN & ZUG-ENGINE (ehem. Gruppe E)
// ================================================================
// Die reinen Skip-Bo-Regeln. Diese Funktionen verändern NUR Daten
// (Game-Objekt) und fassen nie das DOM an. Sie werden von Spieler-
// Eingaben UND von der KI gleichermaßen benutzt.
// Erweiterungs-Regel: Regeländerungen passieren ausschließlich hier.
// ================================================================

/**
 * isValidBuildMove(card, buildPileIndex) – Prüft ob eine Karte auf einen Baustapel darf.
 * Regeln: Leerer Stapel → nur 1 oder Joker. Sonst: Karte = topCard + 1 oder Joker.
 * @param {Object} card – Kartenobjekt {type, value}
 * @param {number} buildPileIndex – Index des Ziel-Baustapels (0-3)
 * @returns {boolean}
 */
function isValidBuildMove(card, buildPileIndex) {
  const buildPile = Game.buildPiles[buildPileIndex];
  if (buildPile.length === 0) {
    return card.type === 'joker' || parseInt(card.value) === 1;
  }
  const topValue  = pileTopValue(buildPile);
  const cardValue = parseInt(card.value);
  return card.type === 'joker' || cardValue === (topValue + 1);
}

/**
 * isBuildPileComplete(buildPileIndex) – Prüft ob ein Baustapel vollständig ist (1-12).
 * @param {number} buildPileIndex – Index des Baustapels (0-3)
 * @returns {boolean}
 */
function isBuildPileComplete(buildPileIndex) {
  const buildPile = Game.buildPiles[buildPileIndex];
  if (buildPile.length === 0) return false;
  const topCard = buildPile[buildPile.length - 1];
  return topCard.value === 12 || (topCard.type === 'joker' && buildPile.length === 12);
}

/**
 * clearBuildPile(buildPileIndex) – Vollständigen Baustapel leeren und Karten mischen.
 * Die geleerten Karten werden dem Nachziehstapel hinzugefügt und neu gemischt.
 * @param {number} buildPileIndex – Index des Baustapels (0-3)
 */
function clearBuildPile(buildPileIndex) {
  if (isBuildPileComplete(buildPileIndex)) {
    const clearedCards = Game.buildPiles[buildPileIndex];
    Game.buildPiles[buildPileIndex] = [];
    Game.drawPile = Game.drawPile.concat(clearedCards);
    shuffleDrawPile();
  }
}

/**
 * shuffleDrawPile() – Nachziehstapel neu mischen (Fisher-Yates).
 */
function shuffleDrawPile() {
  shuffleDeck(Game.drawPile);
}

/**
 * handleBuildPileDrop(player, sourceType, sourceIndex, buildPileIndex)
 * Legt eine Karte auf einen Baustapel (Datenlogik, kein UI-Update).
 * Prüft Gültigkeit und entfernt Karte aus der Quelle.
 * @returns {boolean} true wenn erfolgreich
 */
function handleBuildPileDrop(player, sourceType, sourceIndex, buildPileIndex) {
  let card, sourceArray;

  // Quelle ermitteln
  switch (sourceType) {
    case 'hand':
      sourceArray = Game.players[player].hand;
      card        = sourceArray[sourceIndex];
      break;
    case 'stock':
      sourceArray = Game.players[player].stock;
      card        = sourceArray[sourceArray.length - 1]; // Immer oberste Stockkarte
      break;
    case 'discard':
      sourceArray = Game.players[player].discards[sourceIndex];
      if (sourceArray?.length > 0) {
        card = sourceArray[sourceArray.length - 1]; // Immer oberste Ablagekarte
      } else {
        return false;
      }
      break;
    default:
      return false;
  }

  if (!card) return false;

  // Gültigkeit prüfen und Karte legen
  if (isValidBuildMove(card, buildPileIndex)) {
    Game.buildPiles[buildPileIndex].push(card);
    if (sourceType === 'hand') sourceArray.splice(sourceIndex, 1);
    else sourceArray.pop();

    // Baustapel voll? → leeren und mischen
    if (isBuildPileComplete(buildPileIndex)) clearBuildPile(buildPileIndex);
    return true;
  }
  return false;
}

/**
 * handleDiscardPileDrop(player, sourceType, sourceIndex, discardPileIndex)
 * Legt eine Karte auf einen Ablagestapel (Datenlogik, kein UI-Update).
 * v6.6.0: Die alte KI-"Auto-Auswahl" wurde entfernt – die KI wählt
 * Karte UND Stapel jetzt vorab in playInDiscardPiles() (Modul 10)
 * und übergibt hier immer einen expliziten sourceIndex.
 * @returns {boolean} true wenn erfolgreich
 */
function handleDiscardPileDrop(player, sourceType, sourceIndex, discardPileIndex) {
  let card, sourceArray;
  switch (sourceType) {
    case 'hand':
      sourceArray = Game.players[player].hand;
      card        = sourceArray[sourceIndex];
      break;
    case 'stock':
      // Stockkarten dürfen NICHT auf Ablagestapel gelegt werden (Spielregel!)
      showMessage(`❌ ${player === 'human' ? 'Du' : 'KI'}: Stockkarten darf nicht abgelegt werden!`);
      return false;
    default:
      return false;
  }

  if (!card) return false;

  // Karte ablegen
  if (!Game.players[player].discards[discardPileIndex]) {
    Game.players[player].discards[discardPileIndex] = [];
  }
  Game.players[player].discards[discardPileIndex].push(card);
  sourceArray.splice(sourceIndex, 1);

  // Spieler-Ablage tracken (für KI-Analyse)
  if (player === 'human') {
    trackGameObservations('opponentDiscard', { cardValue: card.value });
  }

  // Deck-Komposition aktualisieren
  try {
    if (card?.value || card?.type === 'joker') {
      const key = card.type === 'joker' ? 'joker' : card.value;
      if (Game.tracking.deckComposition[key] > 0) Game.tracking.deckComposition[key]--;
      Game.tracking.discardHistory[player].values.push(key);
      Game.tracking.discardHistory[player].timestamps.push(Date.now());
    }
  } catch (e) { console.error('Tracking-Fehler:', e); }

  return true;
}

/**
 * drawCardsUntilFive(player) – Karten nachziehen bis die Hand 5 Karten hat.
 * Spieler-Karten werden face-up, KI-Karten face-down gezogen.
 * @param {string} player – 'human' oder 'ai'
 */
function drawCardsUntilFive(player) {
  while (Game.players[player].hand.length < 5 && Game.drawPile.length > 0) {
    const card  = Game.drawPile.pop();
    card.faceUp = (player === 'human');
    Game.players[player].hand.push(card);
  }
  updateView();
}

/**
 * getOpponentCriticalNumbers() – Welche Kartenwerte dem menschlichen Gegner direkt helfen.
 * Gibt die direkten Folgekarten des Gegner-Stocks und der Gegner-Ablagestapel zurück.
 * @returns {number[]} Array von kritischen Kartenwerten
 */
function getOpponentCriticalNumbers() {
  const criticalNumbers = [];
  const humanStock = Game.players.human.stock;

  // Stock-Top: die Karte direkt über dem Stock hilft dem Gegner
  if (humanStock.length > 0) {
    criticalNumbers.push(parseInt(humanStock[humanStock.length - 1].value) + 1);
  }

  // Ablagestapel-Tops: Folgekarten der obersten Ablagekarten
  Game.players.human.discards.forEach(pile => {
    if (pile.length > 0) {
      criticalNumbers.push(parseInt(pile[pile.length - 1].value) + 1);
    }
  });

  return [...new Set(criticalNumbers)]; // Duplikate entfernen
}

/**
 * getDiscardSequenceBonus(player, discardIndex, newCard) – Bonus für Sequenz auf Ablage.
 * +100 wenn neue Karte direkt unter die oberste Ablagekarte passt.
 * @returns {number} Bonus-Score
 */
function getDiscardSequenceBonus(player, discardIndex, newCard) {
  const pile = Game.players[player].discards[discardIndex];
  if (pile.length === 0) return 0.01;
  const topValue = pile[pile.length - 1].value;
  return (newCard.value === topValue - 1) ? 100 : 0;
}

/**
 * cardFaceHTML(value) – Innenleben einer offenen Karte (4 Ecken + Mitte).
 * Zentrales Template damit alle Render-Funktionen identisch aussehen.
 * @param {string|number} value – Anzuzeigender Kartenwert
 * @returns {string} HTML-String
 */
function cardFaceHTML(value) {
  return `
        <div class="card-corner top-left">${value}</div>
        <div class="card-corner top-right">${value}</div>
        <div class="card-middle">${value}</div>
        <div class="card-corner bottom-left">${value}</div>
        <div class="card-corner bottom-right">${value}</div>`;
}

/**
 * updateHand() – Handkarten eines Spielers rendern.
 * Spieler-Karten werden mit Werten angezeigt, KI-Karten als Rückseite.
 * @param {string} player – 'human' oder 'ai'
 * @param {HTMLElement} container – DOM-Element für die Hand
 */
function updateHand(player, container) {
  if (!container) return;
  container.innerHTML = Game.players[player].hand.map(card => `
    <div class="field card ${card.faceUp ? '' : 'backface'}"
         data-type="${card.type}" data-value="${card.value}">
      ${card.faceUp && player === 'human' ? cardFaceHTML(card.value) : ''}
    </div>`).join('');
}

/**
 * updateStock() – Stockstapel eines Spielers rendern.
 * Zeigt die oberste Karte und die Anzahl der verbleibenden Karten.
 * @param {string} player – 'human' oder 'ai'
 * @param {HTMLElement} container – DOM-Element für den Stock
 */
function updateStock(player, container) {
  if (!container) return;
  const stock = Game.players[player].stock;
  if (stock.length > 0) {
    const topCard = stock[stock.length - 1];
    container.innerHTML = `
      <div class="field card"
           data-type="${topCard.type}" data-value="${topCard.value}">${cardFaceHTML(topCard.value)}
        <div class="stock-count">${stock.length}</div>
      </div>`;
  } else {
    container.innerHTML = '<div class="field">🗃️ Leer</div>';
  }
}

/**
 * updateBuildPiles() – Alle 4 Baustapel rendern.
 * Zeigt die oberste Karte jedes Stapels. Joker werden mit ihrem Vertreter-Wert angezeigt.
 */
function updateBuildPiles() {
  document.querySelectorAll('.build-pile').forEach((pileEl, index) => {
    const cards = Game.buildPiles[index];
    if (cards.length > 0) {
      const topCard = cards[cards.length - 1];
      if (topCard.type === 'joker') {
        const jokerValue = getJokerValue(cards, cards.length - 1);
        pileEl.innerHTML = `
          <div class="field card"
               data-type="joker" data-value="joker"
               data-pile-index="${index}">
            <div class="card-corner top-left">★</div>
            <div class="joker-number">${jokerValue}</div>
            <div class="card-corner top-right">★</div>
            <div class="card-middle">★</div>
            <div class="card-corner bottom-left">★</div>
            <div class="card-corner bottom-right">★</div>
          </div>`;
      } else {
        pileEl.innerHTML = `
          <div class="field card"
               data-type="${topCard.type}" data-value="${topCard.value}"
               data-pile-index="${index}">${cardFaceHTML(topCard.value)}
          </div>`;
      }
    } else {
      pileEl.innerHTML = `<div class="field" data-pile-index="${index}">Leer</div>`;
    }
  });
}

/**

  const humanStockField = document.querySelector('.human-area    .field.stock');

  humanStockField.classList.remove('animated-stock-border', 'static-stock-border');

}

/**
 * showMessage(message) – Statusmeldung in der Infozeile anzeigen.
 * Schreibt in span#status-text statt in das gesamte Label,
 * damit der ⚙️-Menübutton nicht überschrieben wird.
 * @param {string} message – Anzuzeigende Nachricht (kann Emojis enthalten)
 */
function showMessage(message) {
  // 🌐 v6.6.0-Sprachmodul: Meldung in die aktive Sprache übersetzen
  if (typeof translateMessage === 'function') message = translateMessage(message);
  const statusText = document.getElementById('status-text');
  if (!statusText) {

    if (statusLabel) statusLabel.textContent = message;
    return;
  }
  statusText.textContent = message;
}

/**
 * enableDraggableStatusLabel() – Infozeile per Touch und Maus verschiebbar machen.
 * Bounce-Effekt beim Loslassen. Funktioniert auf Mobile und Desktop.
 * Label bleibt verschiebbar. Schriftgröße auf status-text angewendet.
 */
function enableDraggableStatusLabel() {
  const label = document.getElementById('status-label');
  if (!label) return;

  // Schrift-Styling auf den Text-Span anwenden
  const statusText = document.getElementById('status-text');
  if (statusText) {
    statusText.style.fontSize   = '1.5rem';
    statusText.style.color      = 'black';
    statusText.style.textShadow = '-1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff';
  }

  let isDragging = false, startY = 0, startTop = 0;

  const disableTransition = () => { label.style.transition = 'none'; };
  const enableTransition  = () => { label.style.transition = 'top 0.3s ease-out, transform 0.3s ease-out'; };
  const bounceEffect      = () => {
    label.style.transform = 'scale(1.15)';
    setTimeout(() => { label.style.transform = 'scale(1)'; }, 300);
  };

  // Maus-Events
  label.addEventListener('mousedown', e => {
    isDragging = true;
    startY     = e.clientY;
    startTop   = parseInt(window.getComputedStyle(label).top) || 0;
    disableTransition();
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    label.style.top = (startTop + (e.clientY - startY)) + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (isDragging) { enableTransition(); bounceEffect(); }
    isDragging = false;
  });

  // Touch-Events
  label.addEventListener('touchstart', e => {
    isDragging = true;
    startY     = e.touches[0].clientY;
    startTop   = parseInt(window.getComputedStyle(label).top) || 0;
    disableTransition();
    e.preventDefault();
  });
  document.addEventListener('touchmove', e => {
    if (!isDragging) return;
    label.style.top = (startTop + (e.touches[0].clientY - startY)) + 'px';
  });
  document.addEventListener('touchend', () => {
    if (isDragging) { enableTransition(); bounceEffect(); }
    isDragging = false;
  });
}

// Verbindet Klick/Touch des menschlichen Spielers mit der Engine.
